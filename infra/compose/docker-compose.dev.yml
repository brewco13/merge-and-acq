services:
  postgres:
    image: postgres:16
    container_name: merge_and_acq_postgres
    environment:
      POSTGRES_DB: merge_and_acq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - merge_and_acq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merge_and_acq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  merge_and_acq_postgres_data:
